spring:
  application:
    name: qbitforce-backend
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 20MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:qbitforce_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  admin:
    username: ${ADMIN_EMAIL:venkataniharbillakurthi@gmail.com}
    email: ${ADMIN_EMAIL:venkataniharbillakurthi@gmail.com}
    password: ${ADMIN_PASSWORD}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  contact:
    to-email: ${CONTACT_TO_EMAIL:venkataniharbillakurthi@gmail.com}
    from-email: ${CONTACT_FROM_EMAIL:venkataniharbillakurthi@gmail.com}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    org.springframework.security: WARN
    com.qbitforce.backend: INFO
